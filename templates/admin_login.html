<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MANJUNATH HAIR SALON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: var(--secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 50px;
            box-shadow: var(--shadow-hover);
            max-width: 450px;
            width: 100%;
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo i {
            font-size: 48px;
            color: var(--primary);
        }
        .login-card .logo h2 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            margin-top: 10px;
        }
        .login-card .logo h2 span {
            color: var(--primary);
        }
        .login-card .logo p {
            color: rgba(0,0,0,0.4);
            font-size: 14px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(201, 168, 76, 0.2);
        }
        .btn-login {
            background: var(--primary);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: var(--dark);
            transition: var(--transition);
            width: 100%;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(0,0,0,0.4);
            text-decoration: none;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-scissors"></i>
            <h2>MANJUNATH <span>HAIR SALON</span></h2>
            <p>Admin Panel Login</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        <i class="fas fa-{{ 'exclamation-circle' if category == 'danger' else 'check-circle' }}"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group mb-3">
                <label class="form-label fw-semibold">
                    <i class="fas fa-envelope" style="color: var(--primary);"></i> Email Address
                </label>
                <input type="email" class="form-control" name="email" placeholder="admin@manjunathsalon.com" required>
            </div>

            <div class="form-group mb-3">
                <label class="form-label fw-semibold">
                    <i class="fas fa-lock" style="color: var(--primary);"></i> Password
                </label>
                <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
            </button>
        </form>

        <a href="{{ url_for('index') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Website
        </a>

        <hr style="margin: 20px 0;">
        <p style="text-align: center; font-size: 13px; color: rgba(0,0,0,0.3);">
            <i class="fas fa-info-circle"></i> Default: admin@manjunathsalon.com / admin123
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
