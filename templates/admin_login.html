<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - MANJUNATH HAIR SALON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: var(--secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 40px 35px;
            box-shadow: var(--shadow-hover);
            max-width: 420px;
            width: 100%;
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-card .logo i {
            font-size: 42px;
            color: var(--primary);
        }
        .login-card .logo h2 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            margin-top: 8px;
            font-size: 24px;
        }
        .login-card .logo h2 span {
            color: var(--primary);
        }
        .login-card .logo p {
            color: rgba(0,0,0,0.4);
            font-size: 13px;
            margin-top: 2px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: var(--transition);
            font-size: 14px;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(201, 168, 76, 0.2);
        }
        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: var(--secondary);
        }
        .btn-login {
            background: var(--primary);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: var(--dark);
            transition: var(--transition);
            width: 100%;
            font-size: 15px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: rgba(0,0,0,0.4);
            text-decoration: none;
            transition: var(--transition);
            font-size: 14px;
        }
        .back-link:hover {
            color: var(--primary);
        }
        .alert {
            border-radius: 10px;
            font-size: 13px;
            padding: 10px 15px;
        }
        .input-group-text {
            background: transparent;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: rgba(0,0,0,0.3);
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
        .input-group .form-control:focus {
            border-left: none;
        }
        .input-group {
            border-radius: 10px;
        }
        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
        }
        .login-footer i {
            color: var(--primary);
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 15px;
            }
            .login-card .logo h2 {
                font-size: 20px;
            }
            .login-card .logo i {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-scissors"></i>
            <h2>MANJUNATH <span>HAIR SALON</span></h2>
            <p>Admin Panel Login</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        <i class="fas fa-{{ 'exclamation-circle' if category == 'danger' else 'check-circle' }}"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" style="font-size: 12px;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group mb-3">
                <label class="form-label">
                    <i class="fas fa-envelope" style="color: var(--primary);"></i> Email Address
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label">
                    <i class="fas fa-lock" style="color: var(--primary);"></i> Password
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
            </button>
        </form>

        <a href="{{ url_for('index') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Website
        </a>

        <div class="login-footer">
            <i class="fas fa-shield-alt"></i> Secure Admin Access
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
