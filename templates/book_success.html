<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - MANJUNATH HAIR SALON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light);
        }
        .success-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 60px 50px;
            box-shadow: var(--shadow-hover);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: popIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            animation: bounce 0.8s ease 0.3s;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .success-icon i {
            font-size: 50px;
            color: white;
        }
        .success-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        .success-card p {
            color: rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .btn-home {
            background: var(--primary);
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
            color: var(--dark);
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3);
            color: var(--dark);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2>Booking Confirmed! 🎉</h2>
            <p>Your appointment has been successfully booked. We'll contact you shortly to confirm.</p>
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <a href="{{ url_for('index') }}" class="btn-home">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="{{ url_for('book') }}" class="btn-home" style="background: var(--secondary); color: white;">
                    <i class="fas fa-calendar-plus"></i> Book Another
                </a>
            </div>
        </div>
    </div>
</body>
</html>
